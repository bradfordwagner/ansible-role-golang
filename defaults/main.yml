---
# go_version: the Go major.minor version line to install (e.g., "1.26").
# The role resolves the latest stable patch release for this minor version automatically.
go_version: "1.26"

# go_root_dir: base directory for versioned Go installations.
# Each version is installed to {{ go_root_dir }}/go-{{ go_resolved_version }}
# (e.g., /usr/local/go-1.26.3). Multiple minor versions can coexist.
go_root_dir: /usr/local

# go_bin_dir: directory where go and gofmt binaries are symlinked.
# This directory must be on PATH so binaries are accessible without a full path.
go_bin_dir: /usr/local/bin

# go_arch_map: maps ansible_architecture values to Go's arch string.
# Extend this map to support additional architectures.
go_arch_map:
  x86_64: amd64
  aarch64: arm64
  arm64: arm64
  i386: "386"
  i686: "386"

# go_src_cleanup_enabled: enable post-install cleanup of security-flagged files
# from the Go install src/ directory. When true, removes all *_test.go and *.pem
# files, and any .go files containing embedded PEM certificate headers.
go_src_cleanup_enabled: false

# go_src_cleanup_extra_files: list of additional paths to delete after install,
# relative to go_install_path. Use for surgical removal of specific files or
# directories that security scanners flag (e.g. testcert.go, internal/synctest).
# Only applied when go_src_cleanup_enabled is true.
go_src_cleanup_extra_files:
  - src/net/http/internal/testcert/testcert.go
  - src/crypto/x509/x509_test_import.go
